services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ngac
      POSTGRES_USER: ngac
      POSTGRES_PASSWORD: ngac_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngac"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.18
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 128M
      - --reserve-memory 0M
      - --overprovisioned
      - --default-log-level=warn
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"
    volumes:
      - redpandadata:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'HEALTHY' || rpk cluster health | grep -q 'healthy'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  policy:
    build:
      context: ./backend
      dockerfile: services/policy/Dockerfile
    environment:
      DATABASE_URL: postgres://ngac:ngac_secret@postgres:5432/ngac?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: redpanda:9092
      GRPC_PORT: "50051"
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50051"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth:
    build:
      context: ./backend
      dockerfile: services/auth/Dockerfile
    environment:
      DATABASE_URL: postgres://ngac:ngac_secret@postgres:5432/ngac?sslmode=disable
      POLICY_SERVICE_ADDR: policy:50051
      REDIS_URL: redis://redis:6379/1
      JWT_SECRET: ngac-super-secret-key-change-in-production
      GRPC_PORT: "50052"
    ports:
      - "50052:50052"
    depends_on:
      policy:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50052"]
      interval: 5s
      timeout: 3s
      retries: 10

  workspace:
    build:
      context: ./backend
      dockerfile: services/workspace/Dockerfile
    environment:
      DATABASE_URL: postgres://ngac:ngac_secret@postgres:5432/ngac?sslmode=disable
      POLICY_SERVICE_ADDR: policy:50051
      GRPC_PORT: "50053"
    ports:
      - "50053:50053"
    depends_on:
      policy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50053"]
      interval: 5s
      timeout: 3s
      retries: 10

  document:
    build:
      context: ./backend
      dockerfile: services/document/Dockerfile
    environment:
      DATABASE_URL: postgres://ngac:ngac_secret@postgres:5432/ngac?sslmode=disable
      POLICY_SERVICE_ADDR: policy:50051
      DATA_DIR: /data/documents
      GRPC_PORT: "50054"
    ports:
      - "50054:50054"
    volumes:
      - docdata:/data/documents
    depends_on:
      policy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50054"]
      interval: 5s
      timeout: 3s
      retries: 10

  messaging:
    build:
      context: ./backend
      dockerfile: services/messaging/Dockerfile
    environment:
      DATABASE_URL: postgres://ngac:ngac_secret@postgres:5432/ngac?sslmode=disable
      POLICY_SERVICE_ADDR: policy:50051
      AUTH_SERVICE_ADDR: auth:50052
      REDIS_URL: redis://redis:6379/2
      KAFKA_BROKERS: redpanda:9092
      GRPC_PORT: "50055"
      WS_PORT: "8081"
    ports:
      - "50055:50055"
      - "8081:8081"
    depends_on:
      policy:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50055"]
      interval: 5s
      timeout: 3s
      retries: 10

  asset:
    build:
      context: ./backend
      dockerfile: services/asset/Dockerfile
    environment:
      DATABASE_URL: postgres://ngac:ngac_secret@postgres:5432/ngac?sslmode=disable
      POLICY_SERVICE_ADDR: policy:50051
      REDIS_URL: redis://redis:6379/3
      KAFKA_BROKERS: redpanda:9092
      GRPC_PORT: "50056"
    ports:
      - "50056:50056"
    depends_on:
      policy:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50056"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build:
      context: ./backend
      dockerfile: services/gateway/Dockerfile
    environment:
      AUTH_SERVICE_ADDR: auth:50052
      POLICY_SERVICE_ADDR: policy:50051
      WORKSPACE_SERVICE_ADDR: workspace:50053
      DOCUMENT_SERVICE_ADDR: document:50054
      MESSAGING_SERVICE_ADDR: messaging:50055
      MESSAGING_WS_ADDR: messaging:8081
      ASSET_SERVICE_ADDR: asset:50056
      JWT_SECRET: ngac-super-secret-key-change-in-production
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      auth:
        condition: service_healthy
      workspace:
        condition: service_healthy
      document:
        condition: service_healthy
      messaging:
        condition: service_healthy
      asset:
        condition: service_healthy

  frontend:
    build:
      context: ./backend/frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway

volumes:
  pgdata:
  docdata:
  redisdata:
  redpandadata:
