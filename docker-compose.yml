services:
  # ============================================
  # Edge Proxy
  # ============================================
  traefik:
    image: traefik:v3.2
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --ping=true
      - --log.level=WARN
    ports:
      - "80:80"       # HTTP entrypoint
      - "8082:8080"    # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ============================================
  # Data Stores
  # ============================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ngac
      POSTGRES_USER: ngac
      POSTGRES_PASSWORD: ngac_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngac"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.18
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 128M
      - --reserve-memory 0M
      - --overprovisioned
      - --default-log-level=warn
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    volumes:
      - redpandadata:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'HEALTHY' || rpk cluster health | grep -q 'healthy'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ngac-admin
      MINIO_ROOT_PASSWORD: ngac-secret-key
    ports:
      - "9000:9000"    # S3 API — direct access for presigned URLs
      - "9001:9001"    # MinIO Console (debug only)
    volumes:
      - miniodata:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.storage.rule=(Host(`zump-biz.vn`) || Host(`localhost`)) && PathPrefix(`/storage`)"
      - "traefik.http.routers.storage.entrypoints=web"
      - "traefik.http.routers.storage.priority=150"
      - "traefik.http.middlewares.storage-strip.stripprefix.prefixes=/storage"
      - "traefik.http.routers.storage.middlewares=cors-all@docker,storage-strip@docker"
      - "traefik.http.services.storage.loadbalancer.server.port=9000"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ============================================
  # Microservices
  # ============================================
  policy:
    build:
      context: ./backend
      dockerfile: services/policy/Dockerfile
    environment:
      DATABASE_URL: postgres://ngac:ngac_secret@postgres:5432/ngac?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: redpanda:9092
      GRPC_PORT: "50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50051"]
      interval: 5s
      timeout: 3s
      retries: 10

  policy-read:
    build:
      context: ./backend
      dockerfile: services/policy/Dockerfile.read
    environment:
      DATABASE_URL: postgres://ngac:ngac_secret@postgres:5432/ngac?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      GRPC_PORT: "50061"
    deploy:
      replicas: 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      policy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50061"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth:
    build:
      context: ./backend
      dockerfile: services/auth/Dockerfile
    environment:
      DATABASE_URL: postgres://ngac:ngac_secret@postgres:5432/ngac?sslmode=disable
      POLICY_SERVICE_ADDR: policy:50051
      REDIS_URL: redis://redis:6379/1
      JWT_SECRET: ngac-super-secret-key-change-in-production
      GRPC_PORT: "50052"
      REST_PORT: "8080"
    depends_on:
      policy:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=(Host(`zump-biz.vn`) || Host(`localhost`)) && (PathPrefix(`/api/auth`) || PathPrefix(`/api/users`))"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.routers.auth.priority=110"
      - "traefik.http.routers.auth.middlewares=cors-all@docker"
      - "traefik.http.services.auth.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50052"]
      interval: 5s
      timeout: 3s
      retries: 10

  workspace:
    build:
      context: ./backend
      dockerfile: services/workspace/Dockerfile
    environment:
      DATABASE_URL: postgres://ngac:ngac_secret@postgres:5432/ngac?sslmode=disable
      POLICY_SERVICE_ADDR: policy:50051
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ngac-admin
      MINIO_SECRET_KEY: ngac-secret-key
      MINIO_USE_SSL: "false"
      GRPC_PORT: "50053"
      REST_PORT: "8080"
      JWT_SECRET: ngac-super-secret-key-change-in-production
      DRIVE_SERVICE_ADDR: drive:50057
    depends_on:
      policy:
        condition: service_healthy
      minio:
        condition: service_healthy
      drive:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.workspace.rule=(Host(`zump-biz.vn`) || Host(`localhost`)) && PathPrefix(`/api/workspaces`)"
      - "traefik.http.routers.workspace.entrypoints=web"
      - "traefik.http.routers.workspace.priority=100"
      - "traefik.http.routers.workspace.middlewares=cors-all@docker"
      - "traefik.http.services.workspace.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50053"]
      interval: 5s
      timeout: 3s
      retries: 10

  document:
    build:
      context: ./backend
      dockerfile: services/document/Dockerfile
    environment:
      DATABASE_URL: postgres://ngac:ngac_secret@postgres:5432/ngac?sslmode=disable
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ngac-admin
      MINIO_SECRET_KEY: ngac-secret-key
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_ENDPOINT: zump-biz.vn:9000
      GRPC_PORT: "50054"
      REST_PORT: "8080"
      JWT_SECRET: ngac-super-secret-key-change-in-production
      DRIVE_SERVICE_ADDR: drive:50057
    depends_on:
      minio:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.document.rule=(Host(`zump-biz.vn`) || Host(`localhost`)) && (PathPrefix(`/api/documents`) || PathRegexp(`/api/workspaces/[^/]+/documents`))"
      - "traefik.http.routers.document.entrypoints=web"
      - "traefik.http.routers.document.priority=120"
      - "traefik.http.routers.document.middlewares=cors-all@docker"
      - "traefik.http.services.document.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50054"]
      interval: 5s
      timeout: 3s
      retries: 10

  messaging:
    build:
      context: ./backend
      dockerfile: services/messaging/Dockerfile
    environment:
      DATABASE_URL: postgres://ngac:ngac_secret@postgres:5432/ngac?sslmode=disable
      POLICY_SERVICE_ADDR: policy:50051
      AUTH_SERVICE_ADDR: auth:50052
      REDIS_URL: redis://redis:6379/2
      KAFKA_BROKERS: redpanda:9092
      GRPC_PORT: "50055"
      WS_PORT: "8081"
      REST_PORT: "8080"
      DRIVE_SERVICE_ADDR: drive:50057
    depends_on:
      policy:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      drive:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      # WebSocket router — priority 200 (highest)
      - "traefik.http.routers.ws.rule=(Host(`zump-biz.vn`) || Host(`localhost`)) && PathPrefix(`/api/ws`)"
      - "traefik.http.routers.ws.entrypoints=web"
      - "traefik.http.routers.ws.priority=200"
      - "traefik.http.routers.ws.service=ws"
      - "traefik.http.middlewares.ws-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.ws.middlewares=ws-strip@docker"
      - "traefik.http.services.ws.loadbalancer.server.port=8081"
      # REST router — channels, messages, DMs, threads, notifications
      - "traefik.http.routers.messaging.rule=(Host(`zump-biz.vn`) || Host(`localhost`)) && (PathPrefix(`/api/channels`) || PathPrefix(`/api/messages`) || PathPrefix(`/api/dms`) || PathPrefix(`/api/threads`) || PathPrefix(`/api/notifications`) || PathRegexp(`/api/workspaces/[^/]+/channels`))"
      - "traefik.http.routers.messaging.entrypoints=web"
      - "traefik.http.routers.messaging.priority=120"
      - "traefik.http.routers.messaging.service=messaging"
      - "traefik.http.routers.messaging.middlewares=cors-all@docker"
      - "traefik.http.services.messaging.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50055"]
      interval: 5s
      timeout: 3s
      retries: 10

  asset:
    build:
      context: ./backend
      dockerfile: services/asset/Dockerfile
    environment:
      DATABASE_URL: postgres://ngac:ngac_secret@postgres:5432/ngac?sslmode=disable
      POLICY_SERVICE_ADDR: policy:50051
      REDIS_URL: redis://redis:6379/3
      KAFKA_BROKERS: redpanda:9092
      GRPC_PORT: "50056"
      REST_PORT: "8080"
      JWT_SECRET: ngac-super-secret-key-change-in-production
    depends_on:
      policy:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.asset.rule=(Host(`zump-biz.vn`) || Host(`localhost`)) && (PathPrefix(`/api/assets`) || PathPrefix(`/api/asset-types`) || PathPrefix(`/api/asset-requests`) || PathRegexp(`/api/workspaces/[^/]+/asset`))"
      - "traefik.http.routers.asset.entrypoints=web"
      - "traefik.http.routers.asset.priority=120"
      - "traefik.http.routers.asset.middlewares=cors-all@docker"
      - "traefik.http.services.asset.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50056"]
      interval: 5s
      timeout: 3s
      retries: 10

  drive:
    build:
      context: ./backend
      dockerfile: services/drive/Dockerfile
    environment:
      DATABASE_URL: postgres://ngac:ngac_secret@postgres:5432/ngac?sslmode=disable
      POLICY_SERVICE_ADDR: policy:50051
      POLICY_READ_SERVICE_ADDR: policy-read:50061
      DOCUMENT_SERVICE_ADDR: document:50054
      GRPC_PORT: "50057"
      REST_PORT: "8080"
      JWT_SECRET: ngac-super-secret-key-change-in-production
    depends_on:
      policy:
        condition: service_healthy
      policy-read:
        condition: service_healthy
      document:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.drive.rule=(Host(`zump-biz.vn`) || Host(`localhost`)) && (PathPrefix(`/api/drive`) || PathRegexp(`/api/workspaces/[^/]+/drive`))"
      - "traefik.http.routers.drive.entrypoints=web"
      - "traefik.http.routers.drive.priority=120"
      - "traefik.http.routers.drive.middlewares=cors-all@docker"
      - "traefik.http.services.drive.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50057"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ============================================
  # Frontend
  # ============================================
  frontend:
    build:
      context: ./frontend
    depends_on:
      - auth
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=(Host(`zump-biz.vn`) || Host(`localhost`)) && PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      # CORS middleware definition (used by all API routers)
      - "traefik.http.middlewares.cors-all.headers.accesscontrolalloworiginlist=http://zump-biz.vn,http://localhost"
      - "traefik.http.middlewares.cors-all.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.cors-all.headers.accesscontrolallowheaders=Accept,Authorization,Content-Type"
      - "traefik.http.middlewares.cors-all.headers.accesscontrolallowcredentials=true"
      - "traefik.http.middlewares.cors-all.headers.accesscontrolmaxage=3600"

volumes:
  pgdata:
  redisdata:
  redpandadata:
  miniodata:
