# Knowledge Layer — NGAC Platform

> Hypothesis-based knowledge system. Items are NOT rules — they are hypotheses
> with confidence scores that evolve through observation.

## Schema

```yaml
- id: K-BOOT-001                   # unique identifier
  type: pattern | anti-pattern | bug
  name: short-name                  # kebab-case
  description: "What and why"
  tags: [go-backend, mutation]      # for relevance filtering
  applicability:
    must_have: [condition]          # ALL must be true to apply
    must_not_have: [condition]      # ANY true → skip
  lifecycle: new | validated | deprecated
  usage_mode: strict | advisory    # strict = must follow, advisory = should consider
  tier: protected | standard       # protected = never auto-pruned
  confidence: 0.5                  # 0.0 to 0.95
  frequency: 1                     # times observed
  impact: low | medium | high
  last_seen: 2026-05-01
  created: 2026-05-01
  source: bootstrap | learn        # how it was created
```

## Lifecycle

```
NEW (confidence 0.5)
  → observed again → confidence +0.1
  → validated by outcome → VALIDATED
  → 20 runs without match (standard tier) → confidence -0.15
  → confidence < 0.3 → DEPRECATED
  → protected tier → NEVER auto-pruned
```

## Confidence Rules

- New item starts at 0.5
- Each positive observation: +0.1 (cap 0.95)
- 20 runs without match (standard tier only): -0.15
- Confidence < 0.3: auto-deprecate (standard tier)
- Protected tier: never auto-deprecated

## Usage Modes

- **strict**: Agent MUST follow. Deviation = blocking issue.
- **advisory**: Agent SHOULD consider. Deviation = documented reason.

## Tiers

- **protected**: System-critical. Never auto-pruned. Manual deprecation only.
- **standard**: Normal items. Subject to confidence decay.

