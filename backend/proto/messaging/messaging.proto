syntax = "proto3";

package messaging;

option go_package = "ngac-platform/proto/messaging";

import "google/protobuf/timestamp.proto";

service MessagingService {
  // Channels
  rpc CreateChannel(CreateChannelRequest) returns (Channel);
  rpc ListChannels(ListChannelsRequest) returns (ChannelList);
  rpc GetChannel(GetChannelRequest) returns (Channel);

  // Channel members
  rpc AddChannelMember(AddChannelMemberRequest) returns (Empty);
  rpc RemoveChannelMember(RemoveChannelMemberRequest) returns (Empty);
  rpc ListChannelMembers(ListChannelMembersRequest) returns (ChannelMemberList);

  // Messages
  rpc SendMessage(SendMessageRequest) returns (Message);
  rpc GetMessages(GetMessagesRequest) returns (MessageList);

  // Threads
  rpc GetThread(GetThreadRequest) returns (MessageList);
  rpc FindThreadsByEntity(FindThreadsByEntityRequest) returns (MessageList);

  // DMs
  rpc CreateDM(CreateDMRequest) returns (Channel);
  rpc ListDMs(ListDMsRequest) returns (ChannelList);

  // Reactions
  rpc AddReaction(AddReactionRequest) returns (Empty);
  rpc RemoveReaction(RemoveReactionRequest) returns (Empty);
  rpc ListReactions(ListReactionsRequest) returns (ReactionList);

  // Pins
  rpc PinMessage(PinMessageRequest) returns (Empty);
  rpc UnpinMessage(UnpinMessageRequest) returns (Empty);
  rpc ListPins(ListPinsRequest) returns (PinnedMessageList);

  // Read receipts
  rpc MarkChannelRead(MarkChannelReadRequest) returns (Empty);
  rpc GetUnreadCounts(GetUnreadCountsRequest) returns (ChannelUnreadList);

  // Search
  rpc SearchMessages(SearchMessagesRequest) returns (MessageList);

  // Polls
  rpc CreatePoll(CreatePollRequest) returns (Poll);
  rpc VotePoll(VotePollRequest) returns (Empty);
  rpc RemoveVote(RemoveVoteRequest) returns (Empty);
  rpc GetPoll(GetPollRequest) returns (Poll);

  // Tasks
  rpc CreateTask(CreateTaskRequest) returns (ChatTask);
  rpc UpdateTask(UpdateTaskRequest) returns (ChatTask);
  rpc ListTasks(ListTasksRequest) returns (ChatTaskList);
}

// NotificationService manages user notifications across the platform.
service NotificationService {
  rpc ListNotifications(ListNotificationsRequest) returns (NotificationList);
  rpc MarkRead(MarkNotificationReadRequest) returns (Empty);
  rpc MarkAllRead(MarkAllNotificationsReadRequest) returns (Empty);
  rpc GetUnreadCount(GetNotificationUnreadCountRequest) returns (NotificationUnreadCountResponse);
}

message Empty {}

// ============================================
// Channel Messages
// ============================================

message Channel {
  string id = 1;
  string name = 2;
  string channel_type = 3;  // "workspace", "private", "dm"
  string workspace_id = 4;
  string ngac_oa_id = 5;
  string ngac_ua_id = 6;
  string created_by = 7;
  google.protobuf.Timestamp created_at = 8;
  string topic = 9;           // Short topic line shown below channel name
  string description = 10;    // Longer channel description
  int32 member_count = 11;    // Denormalized member count
}

message CreateChannelRequest {
  string name = 1;
  string workspace_id = 2;
  string user_id = 3;
  string user_ngac_node_id = 4;
  string channel_type = 5;
}

message ListChannelsRequest {
  string workspace_id = 1;
  string user_ngac_node_id = 2;
}

message GetChannelRequest {
  string channel_id = 1;
}

message ChannelList {
  repeated Channel channels = 1;
}

// ============================================
// Channel Member Messages
// ============================================

message AddChannelMemberRequest {
  string channel_id = 1;
  string requester_ngac_node_id = 2;
  string target_ngac_node_id = 3;
}

message RemoveChannelMemberRequest {
  string channel_id = 1;
  string requester_ngac_node_id = 2;
  string target_ngac_node_id = 3;
}

message ListChannelMembersRequest {
  string channel_id = 1;
}

message ChannelMember {
  string user_id = 1;
  string username = 2;
  string ngac_node_id = 3;
}

message ChannelMemberList {
  repeated ChannelMember members = 1;
}

// ============================================
// Core Message Types
// ============================================

message SendMessageRequest {
  string channel_id = 1;
  string sender_id = 2;
  string sender_ngac_node_id = 3;
  string content = 4;
  string message_type = 5;          // "user" (default), "system"
  string parent_message_id = 6;     // Thread: reply to this message
  string linked_entity_type = 7;    // "asset", "document", "poll", "task"
  string linked_entity_id = 8;      // ID of the linked entity
  string content_format = 9;        // "markdown" (default), "plain"
  repeated string mentions = 10;    // User IDs mentioned in content
}

message Message {
  string id = 1;
  string channel_id = 2;
  string sender_id = 3;
  string sender_name = 4;
  string content = 5;
  google.protobuf.Timestamp created_at = 6;
  string message_type = 7;          // "user", "system"
  string parent_message_id = 8;     // Non-empty if this is a thread reply
  string linked_entity_type = 9;
  string linked_entity_id = 10;
  int32 reply_count = 11;           // Number of replies in thread
  string content_format = 12;       // "markdown", "plain"
  repeated string mentions = 13;    // User IDs mentioned
  repeated ReactionGroup reactions = 14;  // Aggregated reactions
  bool is_pinned = 15;              // Whether message is pinned
}

message GetMessagesRequest {
  string channel_id = 1;
  string user_ngac_node_id = 2;
  string before = 3;  // cursor: timestamp string
  int32 limit = 4;
}

message MessageList {
  repeated Message messages = 1;
  bool has_more = 2;
}

message GetThreadRequest {
  string message_id = 1;
  string user_ngac_node_id = 2;
}

message FindThreadsByEntityRequest {
  string entity_type = 1;
  string entity_id = 2;
  string user_ngac_node_id = 3;
}

// ============================================
// DM Messages
// ============================================

message CreateDMRequest {
  string user_id = 1;
  string user_ngac_node_id = 2;
  string target_user_id = 3;
  string target_ngac_node_id = 4;
}

message ListDMsRequest {
  string user_ngac_node_id = 1;
}

// ============================================
// Reaction Messages
// ============================================

message AddReactionRequest {
  string message_id = 1;
  string user_id = 2;
  string emoji = 3;
}

message RemoveReactionRequest {
  string message_id = 1;
  string user_id = 2;
  string emoji = 3;
}

message ListReactionsRequest {
  string message_id = 1;
}

message Reaction {
  string id = 1;
  string message_id = 2;
  string user_id = 3;
  string emoji = 4;
  google.protobuf.Timestamp created_at = 5;
}

message ReactionGroup {
  string emoji = 1;
  int32 count = 2;
  repeated string user_ids = 3;
}

message ReactionList {
  repeated Reaction reactions = 1;
}

// ============================================
// Pin Messages
// ============================================

message PinMessageRequest {
  string channel_id = 1;
  string message_id = 2;
  string user_id = 3;
}

message UnpinMessageRequest {
  string channel_id = 1;
  string message_id = 2;
}

message ListPinsRequest {
  string channel_id = 1;
}

message PinnedMessage {
  Message message = 1;
  string pinned_by = 2;
  google.protobuf.Timestamp pinned_at = 3;
}

message PinnedMessageList {
  repeated PinnedMessage pins = 1;
}

// ============================================
// Read Receipt Messages
// ============================================

message MarkChannelReadRequest {
  string channel_id = 1;
  string user_id = 2;
  string last_message_id = 3;
}

message GetUnreadCountsRequest {
  string user_id = 1;
}

message ChannelUnread {
  string channel_id = 1;
  int32 unread_count = 2;
  string last_read_message_id = 3;
}

message ChannelUnreadList {
  repeated ChannelUnread channels = 1;
}

// ============================================
// Search Messages
// ============================================

message SearchMessagesRequest {
  string channel_id = 1;
  string query = 2;
  int32 limit = 3;
  string user_ngac_node_id = 4;
}

// ============================================
// Poll Messages
// ============================================

message CreatePollRequest {
  string channel_id = 1;
  string user_id = 2;
  string user_ngac_node_id = 3;
  string question = 4;
  repeated string options = 5;
  bool is_multi = 6;
  bool is_anonymous = 7;
  google.protobuf.Timestamp ends_at = 8;
}

message VotePollRequest {
  string poll_id = 1;
  string option_id = 2;
  string user_id = 3;
}

message RemoveVoteRequest {
  string poll_id = 1;
  string option_id = 2;
  string user_id = 3;
}

message GetPollRequest {
  string poll_id = 1;
}

message PollOption {
  string id = 1;
  string text = 2;
  int32 position = 3;
  int32 vote_count = 4;
  repeated string voter_ids = 5;  // Empty if anonymous
}

message Poll {
  string id = 1;
  string message_id = 2;
  string channel_id = 3;
  string question = 4;
  repeated PollOption options = 5;
  bool is_multi = 6;
  bool is_anonymous = 7;
  string created_by = 8;
  google.protobuf.Timestamp ends_at = 9;
  google.protobuf.Timestamp created_at = 10;
  int32 total_votes = 11;
}

// ============================================
// Chat Task Messages
// ============================================

message CreateTaskRequest {
  string channel_id = 1;
  string user_id = 2;
  string user_ngac_node_id = 3;
  string title = 4;
  string assignee_id = 5;
  string due_date = 6;  // "YYYY-MM-DD"
}

message UpdateTaskRequest {
  string task_id = 1;
  string user_id = 2;
  string status = 3;       // "todo", "in_progress", "done"
  string assignee_id = 4;
  string title = 5;
  string due_date = 6;
}

message ListTasksRequest {
  string channel_id = 1;
  string status = 2;  // filter by status, empty = all
}

message ChatTask {
  string id = 1;
  string message_id = 2;
  string channel_id = 3;
  string title = 4;
  string assignee_id = 5;
  string assignee_name = 6;
  string status = 7;
  string due_date = 8;
  string created_by = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message ChatTaskList {
  repeated ChatTask tasks = 1;
}

// ============================================
// Notification Messages
// ============================================

message Notification {
  string id = 1;
  string user_id = 2;
  string type = 3;                   // "asset_requested", "asset_approved", "asset_assigned", "thread_reply", "mention"
  string title = 4;
  string body = 5;
  string entity_type = 6;           // "asset", "asset_request", "message", etc.
  string entity_id = 7;
  bool read = 8;
  google.protobuf.Timestamp created_at = 9;
}

message ListNotificationsRequest {
  string user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message NotificationList {
  repeated Notification notifications = 1;
  int32 total = 2;
  int32 unread_count = 3;
}

message MarkNotificationReadRequest {
  string notification_id = 1;
  string user_id = 2;
}

message MarkAllNotificationsReadRequest {
  string user_id = 1;
}

message GetNotificationUnreadCountRequest {
  string user_id = 1;
}

message NotificationUnreadCountResponse {
  int32 count = 1;
}
