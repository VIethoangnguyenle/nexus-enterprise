syntax = "proto3";

package document;

option go_package = "ngac-platform/proto/document";

import "google/protobuf/timestamp.proto";

// DocumentStorageService handles raw object storage operations via MinIO.
// No NGAC awareness — access control is handled by the Drive Service.
service DocumentStorageService {
  // Presigned URL flow
  rpc GetUploadURL(GetUploadURLRequest) returns (GetUploadURLResponse);
  rpc ConfirmUpload(ConfirmUploadRequest) returns (ConfirmUploadResponse);
  rpc GetDownloadURL(GetDownloadURLRequest) returns (GetDownloadURLResponse);

  // Object management
  rpc DeleteObject(DeleteObjectRequest) returns (Empty);
  rpc CopyObject(CopyObjectRequest) returns (CopyObjectResponse);
  rpc GetObjectInfo(GetObjectInfoRequest) returns (ObjectInfo);
}

message Empty {}

// --- Presigned URL flow ---

message GetUploadURLRequest {
  string workspace_id = 1;
  string filename = 2;
  string mime_type = 3;
  string doc_id = 4;              // caller-provided ID for the object key
}

message GetUploadURLResponse {
  string upload_url = 1;
  string object_key = 2;
}

message ConfirmUploadRequest {
  string workspace_id = 1;
  string object_key = 2;
}

message ConfirmUploadResponse {
  int64 size_bytes = 1;
  string content_type = 2;
}

message GetDownloadURLRequest {
  string workspace_id = 1;
  string object_key = 2;
}

message GetDownloadURLResponse {
  string download_url = 1;
}

// --- Object management ---

message DeleteObjectRequest {
  string workspace_id = 1;
  string object_key = 2;
}

message CopyObjectRequest {
  string src_workspace_id = 1;
  string src_object_key = 2;
  string dst_workspace_id = 3;
  string dst_object_key = 4;
}

message CopyObjectResponse {
  string object_key = 1;
  int64 size_bytes = 2;
}

message GetObjectInfoRequest {
  string workspace_id = 1;
  string object_key = 2;
}

message ObjectInfo {
  string object_key = 1;
  int64 size_bytes = 2;
  string content_type = 3;
  google.protobuf.Timestamp last_modified = 4;
}
